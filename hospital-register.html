<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Hospital Registration</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Hospital Registration</h1>

<input
type="text"
id="englishName"
placeholder="Hospital Name">

<input
type="text"
id="tamilName"
placeholder="Hospital Name (Tamil)">

<input
type="email"
id="email"
placeholder="Hospital Email">

<input
type="password"
id="password"
placeholder="Password">

<input
type="text"
id="contact"
placeholder="Emergency Contact">

<button onclick="registerHospital()">

Register Hospital

</button>

</div>

<script type="module" src="hospital-register.js"></script>

</body>

</html>
